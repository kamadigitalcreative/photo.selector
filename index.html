<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Selection</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #f6f6f9;
        }
        /* Trik CSS untuk menyembunyikan banner Google Apps Script */
        iframe {
            position: absolute;
            top: -28px; /* Menggeser iframe ke atas untuk menyembunyikan banner */
            left: 0;
            border: none;
            width: 100vw;
            height: calc(100vh + 28px); /* Menambah tinggi untuk kompensasi pergeseran */
        }
    </style>
</head>
<body>

    <iframe id="gasFrame" src=""></iframe>

    <script>
        // MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI BAWAH INI (Akhiran /exec)
        const gasAppUrl = "https://script.google.com/macros/s/AKfycbyEvwY1w5H3GuZ1Y9l3W7-ZeBJCu79XKx5xMgCVqGBu5C1OnX9YiWDwa8hrdr65P8sV/exec";

        // Ambil parameter dari link pendek (contoh: ?c=Wedding123)
        const queryString = window.location.search;

        // Tembak URL lengkap ke dalam iframe pembungkus
        document.getElementById('gasFrame').src = gasAppUrl + queryString;
    </script>

</body>
</html>
