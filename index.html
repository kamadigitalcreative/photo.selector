<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Photo Selection</title>
    
    <link rel="icon" type="image/png" href="Artboard 1.png">

    <style>
        /* Pengaturan dasar layar */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #f6f6f9; font-family: 'Segoe UI', Tahoma, sans-serif;
            color: #1e1e2d;
        }

        /* Tampilan Iframe (Disembunyikan secara default) */
        #app-frame {
            width: 100%; height: 100%; border: none; display: none;
        }

        /* Tampilan Loading Redirect (Disembunyikan secara default) */
        #loading-screen {
            display: none; height: 100%; width: 100%;
            justify-content: center; align-items: center; flex-direction: column;
        }
        .loading-container {
            text-align: center; padding: 30px; background: white; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .spinner {
            border: 4px solid #ececf1; border-top: 4px solid #1e1e2d;
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 16px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <iframe id="app-frame" allow="clipboard-write"></iframe>

    <div id="loading-screen">
        <div class="loading-container">
            <div class="spinner"></div>
            <h3 style="margin: 0 0 8px 0; font-size: 18px;">Membuka Galeri...</h3>
            <p style="margin: 0; font-size: 13px; color: #6b7280;">Mengarahkan ke server aman.</p>
        </div>
    </div>

    <script>
        // =========================================================================
        // WAJIB GANTI: Masukkan link Web App Google Apps Script Anda (berakhiran /exec)
        // =========================================================================
        var gasWebAppUrl = "https://script.google.com/macros/s/AKfycbxRFQVmTFVtXcEV6T8XuqUeYI1mKPo4HmT3zcrYtqVIbnyJQu66F824HQ1G3eGxZkhg/exec"; 

        // Ambil parameter dari link (contoh: ?c=tuuu)
        var urlParams = window.location.search;
        
        // =========================================================================
        // LOGIKA PEMISAH (HYBRID)
        // =========================================================================
        
        // Mengecek apakah link mengandung kode klien "?c=" (berlaku untuk ?c=tuuu dan klien lainnya)
        if (urlParams.indexOf('?c=') !== -1) {
            
            // JIKA LINK KLIEN: Munculkan animasi loading dan arahkan ke link asli App Script
            document.getElementById('loading-screen').style.display = 'flex';
            
            setTimeout(function() {
                window.location.replace(gasWebAppUrl + urlParams);
            }, 800); // Redirect setelah 0.8 detik

        } else {
            
            // JIKA LINK UTAMA (Tanpa parameter klien): Munculkan Iframe agar domain tetap utuh
            document.getElementById('app-frame').style.display = 'block';
            document.getElementById('app-frame').src = gasWebAppUrl + urlParams;

        }
    </script>

</body>
</html>
