<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Selection</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100vh; border: none; display: block; }
    </style>
</head>
<body>

    <iframe id="appFrame" src="">Memuat aplikasi...</iframe>

    <script>
        // 1. GANTI URL DI BAWAH dengan URL Web App GAS Anda
        const gasUrl = "https://script.google.com/macros/s/AKfycbxSu7ozoyP5orZ7bGKaONnQqDVfk4_69BXhQqWeMDn3jGtwFuHwClIU4CDTSbkUCrn9/exec";
        
        // 2. Mengambil parameter dari URL saat ini (contoh: ?c=tudiah)
        const urlParams = window.location.search;
        
        // 3. Menggabungkan URL GAS dengan parameter, lalu memasukkannya ke iframe
        document.getElementById('appFrame').src = gasUrl + urlParams;
    </script>

</body>
</html>
