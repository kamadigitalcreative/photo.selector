<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Photo Selection</title>
    
    <link rel="icon" href="Artboard 1.png" type="image/png">

    <script>
        // 1. Tangkap kode slug (?c=...) dari URL ps.kamacreative.my.id
        const urlParams = new URLSearchParams(window.location.search);
        const c = urlParams.get('c');
        
        // 2. PASTE URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        // Ganti URL di bawah dengan URL Deployment "exec" Anda yang asli
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxSu7ozoyP5orZ7bGKaONnQqDVfk4_69BXhQqWeMDn3jGtwFuHwClIU4CDTSbkUCrn9/exec"; 
        
        // 3. Alihkan pengunjung ke server Google dengan aman
        if (c) {
            window.location.replace(webAppUrl + "?c=" + c);
        } else {
            window.location.replace(webAppUrl);
        }
    </script>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: #f6f6f9; color: #1e1e2d; margin: 0; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(59, 130, 246, 0.2); border-left-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h3 style="font-size: 16px; font-weight: 600;">Mengalihkan ke Galeri...</h3>
    <p style="font-size: 12px; color: #6b7280;">Mohon tunggu sebentar.</p>
</body>
</html>
