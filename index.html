<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Selection</title>
    <link rel="icon" href="Artboard 1.png" type="image/png">
    <style>
        /* Memastikan Iframe memenuhi seluruh layar tanpa scrollbar tambahan */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f6f6f9; }
        iframe { border: none; width: 100%; height: 100%; display: block; }
        .spinner-container { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: system-ui, sans-serif; color: #1e1e2d; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(59, 130, 246, 0.2); border-left-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <script>
        // 1. Tangkap kode slug (?c=...) dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const c = urlParams.get('c');
        
        // 2. PASTE URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI (Akhiran /exec)
        const webAppUrl = "https://script.google.com/macros/s/AKfycbxSu7ozoyP5orZ7bGKaONnQqDVfk4_69BXhQqWeMDn3jGtwFuHwClIU4CDTSbkUCrn9/exec"; 
        
        if (c) {
            // JIKA KLIEN: Tampilkan animasi loading lalu lempar ke Google (Agar bebas error Drive)
            document.write(`
                <div class="spinner-container">
                    <div class="spinner"></div>
                    <h3 style="font-size: 16px; font-weight: 600; margin:0;">Mengalihkan ke Galeri...</h3>
                    <p style="font-size: 12px; color: #6b7280; margin-top:8px;">Mohon tunggu sebentar.</p>
                </div>
            `);
            window.location.replace(webAppUrl + "?c=" + c);
        } else {
            // JIKA ADMIN/FOTOGRAFER: Tampilkan pakai Iframe (URL di atas tetap pendek!)
            document.write('<iframe src="' + webAppUrl + '"></iframe>');
        }
    </script>
</body>
</html>
